name: quality-gates

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: DB contract check
        run: npm run check:db-contract

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build check
        run: npm run build
