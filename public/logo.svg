<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="navyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3F76"/>
      <stop offset="100%" style="stop-color:#17325F"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3ab54a"/>
      <stop offset="100%" style="stop-color:#2E9448"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="200" cy="200" r="180" fill="url(#navyGrad)" filter="url(#shadow)"/>
  
  <!-- The X - Stylized with organization/grid feel -->
  <!-- Left arm -->
  <path d="M95 95 L175 175 L165 185 L85 105 Z" fill="white" opacity="0.95"/>
  <!-- Right arm -->
  <path d="M305 95 L225 175 L235 185 L315 105 Z" fill="white" opacity="0.95"/>
  
  <!-- Cross bar - Creates organized grid feel -->
  <rect x="85" y="185" width="230" height="30" fill="white" opacity="0.9" rx="2"/>
  
  <!-- Center square - The "spot" for organization -->
  <rect x="165" y="165" width="70" height="70" fill="url(#greenGrad)" rx="8"/>
  
  <!-- Checkmark in center - Trust -->
  <path d="M185 200 L200 215 L225 185" stroke="white" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Tagline area -->
  <text x="200" y="340" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="14" font-weight="600" letter-spacing="2">SCHOOLX</text>
</svg>