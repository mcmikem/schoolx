<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Omuto SMS - Offline</title>
    <meta
      name="description"
      content="You are currently offline. Your data is saved locally and will sync when your internet connection is restored. Omuto School Management System."
    />
    <meta property="og:title" content="Omuto SMS - Offline" />
    <meta
      property="og:description"
      content="You are currently offline. Your data is saved locally and will sync when your internet connection is restored."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://omuto.sms/offline" />
    <meta property="og:image" content="https://omuto.sms/og-image.png" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Instrument Sans", system-ui, sans-serif;
        background: #f0f2f5;
        color: #17325f;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 20px;
      }
      .container {
        text-align: center;
        max-width: 400px;
      }
      .icon {
        width: 80px;
        height: 80px;
        background: #17325f;
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
      }
      .icon span {
        color: #fff;
        font-size: 28px;
        font-weight: 700;
      }
      h1 {
        font-size: 24px;
        margin-bottom: 12px;
      }
      p {
        color: #666;
        font-size: 15px;
        line-height: 1.5;
        margin-bottom: 24px;
      }
      button {
        background: #17325f;
        color: #fff;
        border: none;
        padding: 12px 32px;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover {
        background: #0f2240;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon"><span>SX</span></div>
      <h1>You're Offline</h1>
      <p>
        Please check your internet connection. Your data is saved locally and
        will sync when you're back online.
      </p>
      <button
        onclick="window.location.reload()"
        onkeydown="
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            window.location.reload();
          }
        "
      >
        Try Again
      </button>
    </div>
  </body>
</html>
