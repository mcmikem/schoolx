<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3F76"/>
      <stop offset="100%" style="stop-color:#0F1E33"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2E9448"/>
      <stop offset="100%" style="stop-color:#3ab54a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>
  
  <!-- X shape - stylized with geometric precision -->
  <g transform="translate(256, 256)">
    <!-- Main X -->
    <path d="M-120 -120 L-40 -40 L-20 -60 L-100 -140 Z" fill="white" opacity="0.95"/>
    <path d="M120 -120 L40 -40 L60 -60 L140 -140 Z" fill="white" opacity="0.95"/>
    <path d="M-120 120 L-40 40 L-20 60 L-100 140 Z" fill="white" opacity="0.95"/>
    <path d="M120 120 L40 40 L60 60 L140 140 Z" fill="white" opacity="0.95"/>
    
    <!-- Center square - the organized core -->
    <rect x="-45" y="-45" width="90" height="90" fill="white" rx="8"/>
    
    <!-- Green accent in center -->
    <rect x="-30" y="-30" width="60" height="60" fill="url(#accentGrad)" rx="6" filter="url(#glow)"/>
    
    <!-- X inside the square -->
    <path d="M-18 -18 L18 18" stroke="white" stroke-width="6" stroke-linecap="round"/>
    <path d="M18 -18 L-18 18" stroke="white" stroke-width="6" stroke-linecap="round"/>
  </g>
  
  <!-- Bottom tagline -->
  <text x="256" y="440" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" letter-spacing="6" opacity="0.9">SCHOOLX</text>
  <text x="256" y="470" text-anchor="middle" fill="#2E9448" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" letter-spacing="1">Built from Xperience</text>
</svg>