<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="url(#grad)"/>
  
  <!-- Graduation cap -->
  <g transform="translate(8, 8)">
    <polygon points="8,0 16,4 8,8 0,4" fill="white"/>
    <rect x="2" y="4" width="12" height="2" fill="white" opacity="0.8"/>
    <circle cx="14" cy="5" r="1.5" fill="white"/>
    <line x1="14" y1="5" x2="17" y2="10" stroke="white" stroke-width="1"/>
    <circle cx="17" cy="11" r="1" fill="white"/>
  </g>
</svg>