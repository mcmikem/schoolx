<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" fill="none">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Graduation cap icon -->
  <g transform="translate(5, 8)">
    <!-- Cap top -->
    <polygon points="20,0 40,10 20,20 0,10" fill="url(#gradient)"/>
    <!-- Cap tassel -->
    <circle cx="35" cy="12" r="3" fill="#6366f1"/>
    <line x1="35" y1="12" x2="42" y2="22" stroke="#6366f1" stroke-width="2"/>
    <circle cx="42" cy="24" r="2.5" fill="#8b5cf6"/>
    <!-- Cap base -->
    <rect x="5" y="10" width="30" height="4" fill="#4f46e5" rx="1"/>
  </g>
  
  <!-- SchoolX text -->
  <text x="55" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="bold" fill="url(#gradient)">School<tspan fill="#6366f1">X</tspan></text>
</svg>